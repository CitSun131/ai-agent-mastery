name: CI — AI Agent Mastery

on:
  push:
    branches: [main, "week-*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check shared/ project-topic-research-agent/src/ --ignore E501

      - name: Run unit tests
        run: |
          cd project-topic-research-agent
          python -m pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Check imports
        run: |
          python -c "from shared.schemas import ResearchSummary, KeyPoint, AgentResponse"
          python -c "from shared.utils.cost_tracker import CostTracker"
          echo "All imports OK"
