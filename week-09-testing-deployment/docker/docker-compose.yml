version: "3.8"

services:
  research-agent:
    build:
      context: ../..
      dockerfile: week-09-testing-deployment/docker/Dockerfile
    ports:
      - "8000:8000"   # Agent API
      - "6006:6006"   # Phoenix dashboard
    env_file:
      - ../../config/.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../../project-topic-research-agent:/app/project-topic-research-agent
    restart: unless-stopped

  # Optional: Phoenix standalone (if not running in-process)
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6007:6006"
    restart: unless-stopped
